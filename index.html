<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSP AI Quiz Test</title>
  <style>
    :root{
      --bg:#ffffff;
      --text:#000000;
      --muted:#555;
      --border:#000000;
      --card:#ffffff;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      font-family:Arial, sans-serif;
    }

    body{
      background:var(--bg);
      color:var(--text);
      padding:20px;
    }

    .container{
      max-width:1000px;
      margin:0 auto;
    }

    .card{
      border:1px solid var(--border);
      border-radius:14px;
      padding:20px;
      background:var(--card);
      margin-bottom:18px;
    }

    h1{
      font-size:28px;
      margin-bottom:8px;
    }

    p{
      color:var(--muted);
      line-height:1.5;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:14px;
      margin-top:18px;
    }

    label{
      display:block;
      font-size:14px;
      font-weight:bold;
      margin-bottom:8px;
    }

    select, button{
      width:100%;
      padding:12px;
      border:1px solid var(--border);
      border-radius:10px;
      background:#fff;
      color:#000;
      font-size:15px;
    }

    button{
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      background:#000;
      color:#fff;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .timer{
      border:1px solid var(--border);
      border-radius:999px;
      padding:10px 16px;
      font-weight:bold;
    }

    .question-count{
      font-weight:bold;
    }

    .question-box{
      margin-bottom:18px;
      line-height:1.7;
      font-size:18px;
    }

    .options{
      display:grid;
      gap:10px;
    }

    .option{
      border:1px solid var(--border);
      border-radius:10px;
      padding:12px;
      cursor:pointer;
      transition:0.2s;
    }

    .option:hover{
      background:#f3f3f3;
    }

    .option.selected{
      background:#000;
      color:#fff;
    }

    .actions{
      display:flex;
      gap:10px;
      margin-top:18px;
      flex-wrap:wrap;
    }

    .actions button{
      width:auto;
      min-width:140px;
    }

    .hidden{
      display:none;
    }

    .result-box{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
      gap:12px;
      margin-top:18px;
    }

    .stat{
      border:1px solid var(--border);
      border-radius:12px;
      padding:16px;
    }

    .stat h3{
      font-size:15px;
      margin-bottom:8px;
    }

    .stat p{
      font-size:22px;
      color:#000;
      font-weight:bold;
    }

    .review-item{
      border:1px solid var(--border);
      border-radius:12px;
      padding:16px;
      margin-top:14px;
    }

    .review-item h4{
      margin-bottom:10px;
      line-height:1.6;
    }

    .review-item p{
      color:#000;
      margin:6px 0;
    }

    .correct{
      color:green;
      font-weight:bold;
    }

    .wrong{
      color:#b00020;
      font-weight:bold;
    }

    .neutral{
      color:#444;
      font-weight:bold;
    }

    @media (max-width:600px){
      h1{
        font-size:24px;
      }

      .question-box{
        font-size:16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card" id="setupCard">
      <h1>SSP AI Quiz Test</h1>
      <p>select Subject, topic, level and difficulty.</p>

      <div class="grid">
        <div>
          <label for="subject">Subject</label>
          <select id="subject">
            <option value="">Select Subject</option>
        
        </div>

        <div>
          <label for="topic">Topic</label>
          <select id="topic">
            <option value="">Select Topic</option>
          </select>
        </div>

        <div>
          <label for="level">Level</label>
          <select id="level">
            <option value="">Select Level</option>
          </select>
        </div>

        <div>
          <label for="difficulty">Difficulty</label>
          <select id="difficulty">
            <option value="">Select Difficulty</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button id="startTestBtn">Start Test</button>
      </div>
    </div>

    <div class="card hidden" id="testCard">
      <div class="topbar">
        <div class="question-count" id="questionCount">Question 1 / 10</div>
        <div class="timer" id="timer">20:00</div>
      </div>

      <div class="question-box" id="questionBox"></div>
      <div class="options" id="optionsBox"></div>

      <div class="actions">
        <button id="prevBtn">Previous</button>
        <button id="nextBtn">Next</button>
        <button id="submitBtn">Submit Test</button>
      </div>
    </div>

    <div class="card hidden" id="resultCard">
      <h1>Test Result</h1>
      <p>Yahan overall score aur detailed analysis diya gaya hai.</p>

      <div class="result-box">
        <div class="stat">
          <h3>Total Questions</h3>
          <p id="totalQuestions">0</p>
        </div>
        <div class="stat">
          <h3>Correct</h3>
          <p id="correctCount">0</p>
        </div>
        <div class="stat">
          <h3>Wrong</h3>
          <p id="wrongCount">0</p>
        </div>
        <div class="stat">
          <h3>Unanswered</h3>
          <p id="unansweredCount">0</p>
        </div>
        <div class="stat">
          <h3>Score</h3>
          <p id="scoreText">0 / 10</p>
        </div>
        <div class="stat">
          <h3>Accuracy</h3>
          <p id="accuracyText">0%</p>
        </div>
      </div>

      <div id="reviewBox"></div>
    </div>
  </div>

  <script>
    let allQuestions = [];
    let filteredQuestions = [];
    let selectedQuestions = [];
    let userAnswers = [];
    let currentQuestionIndex = 0;
    let timerInterval = null;
    let timeLeft = 20 * 60;

    const subjectEl = document.getElementById("subject");
    const topicEl = document.getElementById("topic");
    const levelEl = document.getElementById("level");
    const difficultyEl = document.getElementById("difficulty");

    const setupCard = document.getElementById("setupCard");
    const testCard = document.getElementById("testCard");
    const resultCard = document.getElementById("resultCard");

    const questionCountEl = document.getElementById("questionCount");
    const questionBox = document.getElementById("questionBox");
    const optionsBox = document.getElementById("optionsBox");
    const timerEl = document.getElementById("timer");

    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const submitBtn = document.getElementById("submitBtn");
    const startTestBtn = document.getElementById("startTestBtn");

    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

    function startTimer() {
      timerEl.textContent = formatTime(timeLeft);

      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = formatTime(timeLeft);

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          submitTest();
        }
      }, 1000);
    }

    function populateDropdown(selectEl, values, placeholder) {
      selectEl.innerHTML = `<option value="">${placeholder}</option>`;
      [...new Set(values)].forEach(value => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        selectEl.appendChild(option);
      });
    }

    function loadInitialFilters() {
      populateDropdown(subjectEl, allQuestions.map(q => q.subject), "Select Subject");
      populateDropdown(levelEl, allQuestions.map(q => q.level), "Select Level");
      populateDropdown(difficultyEl, allQuestions.map(q => q.difficulty), "Select Difficulty");

      topicEl.innerHTML = `<option value="">Select Topic</option>`;
    }

    function updateTopicsBySubject() {
      const selectedSubject = subjectEl.value;

      topicEl.innerHTML = `<option value="">Select Topic</option>`;

      if (!selectedSubject) return;

      const topics = allQuestions
        .filter(q => q.subject === selectedSubject)
        .map(q => q.topic);

      [...new Set(topics)].forEach(topic => {
        const option = document.createElement("option");
        option.value = topic;
        option.textContent = topic;
        topicEl.appendChild(option);
      });
    }

    function renderQuestion() {
      const q = selectedQuestions[currentQuestionIndex];
      questionCountEl.textContent = `Question ${currentQuestionIndex + 1} / ${selectedQuestions.length}`;
      questionBox.textContent = q.question;
      optionsBox.innerHTML = "";

      q.options.forEach((optionText, index) => {
        const option = document.createElement("div");
        option.className = "option";
        option.textContent = `${String.fromCharCode(65 + index)}. ${optionText}`;

        if (userAnswers[currentQuestionIndex] === index) {
          option.classList.add("selected");
        }

        option.addEventListener("click", () => {
          userAnswers[currentQuestionIndex] = index;
          renderQuestion();
        });

        optionsBox.appendChild(option);
      });

      prevBtn.style.display = currentQuestionIndex === 0 ? "none" : "inline-block";
      nextBtn.style.display = currentQuestionIndex === selectedQuestions.length - 1 ? "none" : "inline-block";
      submitBtn.style.display = currentQuestionIndex === selectedQuestions.length - 1 ? "inline-block" : "none";
    }

    function submitTest() {
      clearInterval(timerInterval);
      testCard.classList.add("hidden");
      resultCard.classList.remove("hidden");

      let correct = 0;
      let wrong = 0;
      let unanswered = 0;

      selectedQuestions.forEach((q, index) => {
        if (userAnswers[index] === null) {
          unanswered++;
        } else if (userAnswers[index] === q.answer) {
          correct++;
        } else {
          wrong++;
        }
      });

      const total = selectedQuestions.length;
      const accuracy = total ? Math.round((correct / total) * 100) : 0;

      document.getElementById("totalQuestions").textContent = total;
      document.getElementById("correctCount").textContent = correct;
      document.getElementById("wrongCount").textContent = wrong;
      document.getElementById("unansweredCount").textContent = unanswered;
      document.getElementById("scoreText").textContent = `${correct} / ${total}`;
      document.getElementById("accuracyText").textContent = `${accuracy}%`;

      const reviewBox = document.getElementById("reviewBox");
      reviewBox.innerHTML = "<h2 style='margin-top:22px;'>Detailed Analysis</h2>";

      selectedQuestions.forEach((q, index) => {
        const userAnswer = userAnswers[index];
        const statusClass =
          userAnswer === null ? "neutral" :
          userAnswer === q.answer ? "correct" : "wrong";

        const statusText =
          userAnswer === null ? "Unanswered" :
          userAnswer === q.answer ? "Correct" : "Wrong";

        const div = document.createElement("div");
        div.className = "review-item";
        div.innerHTML = `
          <h4>Q${index + 1}. ${q.question}</h4>
          <p class="${statusClass}">Status: ${statusText}</p>
          <p><strong>Your Answer:</strong> ${
            userAnswer === null ? "Not Attempted" : q.options[userAnswer]
          }</p>
          <p><strong>Correct Answer:</strong> ${q.options[q.answer]}</p>
          <p><strong>Explanation:</strong> ${q.explanation}</p>
        `;
        reviewBox.appendChild(div);
      });
    }

    startTestBtn.addEventListener("click", () => {
      const subject = subjectEl.value.trim();
      const topic = topicEl.value.trim();
      const level = levelEl.value.trim();
      const difficulty = difficultyEl.value.trim();

      if (!subject || !topic || !level || !difficulty) {
        alert("Please select subject, topic, level and difficulty");
        return;
      }

      filteredQuestions = allQuestions.filter(q =>
        q.subject === subject &&
        q.topic === topic &&
        q.level === level &&
        q.difficulty === difficulty
      );

      if (filteredQuestions.length < 10) {
        alert("question not found!!");
        return;
      }

      selectedQuestions = shuffleArray(filteredQuestions).slice(0, 10);
      userAnswers = new Array(selectedQuestions.length).fill(null);
      currentQuestionIndex = 0;
      timeLeft = 20 * 60;

      setupCard.classList.add("hidden");
      resultCard.classList.add("hidden");
      testCard.classList.remove("hidden");

      renderQuestion();
      startTimer();
    });

    prevBtn.addEventListener("click", () => {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        renderQuestion();
      }
    });

    nextBtn.addEventListener("click", () => {
      if (currentQuestionIndex < selectedQuestions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
      }
    });

    submitBtn.addEventListener("click", submitTest);

    subjectEl.addEventListener("change", updateTopicsBySubject);

    async function init() {
      try {
        const response = await fetch("./aiques.json");
        allQuestions = await response.json();
        loadInitialFilters();
      } catch (error) {
        alert("an error occured");
        console.error(error);
      }
    }

    init();
  </script>
</body>
</html>
